aid: f5-distributed-cloud-services
name: F5 Distributed Cloud Services
description: >-
  F5 Distributed Cloud Services (F5 XC) is a SaaS-based platform providing
  distributed multi-cloud application security, networking, and edge
  infrastructure including web application and API protection (WAAP), DDoS
  mitigation, bot defense, multi-cloud networking, DNS, load balancing, and
  edge compute across F5's global private backbone. The platform's REST API
  exposes 200+ resource types covering HTTP/TCP/UDP load balancers, security
  policies, certificate management, cloud connectors, and observability,
  authenticated via API tokens and service credentials managed in the F5
  Distributed Cloud Console.
